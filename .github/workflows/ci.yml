name: CI

on:
  workflow_call:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".planning/**"
      - "specification/**"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - ".planning/**"
      - "specification/**"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        ts-version: ["5.7", "5.8", "5.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun ci
      - if: matrix.ts-version != '5.9'
        run: bun add --no-save typescript@~${{ matrix.ts-version }}
      - run: bunx tsc --version
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        ts-version: ["5.7", "5.8", "5.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun ci
      - if: matrix.ts-version != '5.9'
        run: bun add --no-save typescript@~${{ matrix.ts-version }}
      - run: bunx tsc --version
      - run: bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        ts-version: ["5.7", "5.8", "5.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun ci
      - if: matrix.ts-version != '5.9'
        run: bun add --no-save typescript@~${{ matrix.ts-version }}
      - run: bunx tsc --version
      - run: bun run test:coverage

  build-validate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        ts-version: ["5.7", "5.8", "5.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun ci
      - if: matrix.ts-version != '5.9'
        run: bun add --no-save typescript@~${{ matrix.ts-version }}
      - run: bunx tsc --version
      - run: bun run build
      - run: bun run validate

  ci-pass:
    if: always()
    needs: [lint, typecheck, test, build-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "lint: ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "build-validate: ${{ needs.build-validate.result }}"

          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi

          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more jobs were cancelled"
            exit 1
          fi

          echo "All jobs passed successfully"
